<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin News Panel</title>
    <link rel="stylesheet" href="news.css">
</head>
<body>
    <header>
        <h1>Admin - Manage News</h1>
    </header>
    <main>
        <table>
            <thead>
                <tr>
                    <th>News Title</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <img src="news1.jpg" alt="News 1" class="news-thumb" />
                        First News Title
                    </td>
                    <td>March 20, 2025</td>
                    <td>
                        <button>Edit</button>
                        <button class="delete">Delete</button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <img src="news2.jpg" alt="News 2" class="news-thumb" />
                        Second News Title
                    </td>
                    <td>March 21, 2025</td>
                    <td>
                        <button>Edit</button>
                        <button class="delete">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
